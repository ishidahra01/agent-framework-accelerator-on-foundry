name: azure-resource-analyzer-optimizer
agent:
  name: azure-resource-analyzer
  kind: hosted
  version: "<deployed-agent-version>"
  model: <existing-eval-model-deployment>
  config: <relative-agent-root>/optimizer_configs/baseline/metadata.yaml
dataset_file: <relative-repo-root>/evals/datasets/bad-config.queries.jsonl
evaluators:
  - builtin.task_adherence
  - builtin.coherence
  - builtin.violence