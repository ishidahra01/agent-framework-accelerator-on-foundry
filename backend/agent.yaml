name: azure-resource-analyzer
description: Azure resource analyzer built on Microsoft Agent Framework, hosted on Microsoft Foundry.
template:
  kind: hosted
  protocols:
      - protocol: responses
        version: 1.0.0
  environment_variables:
      # Foundry project the agent talks to. Hosted Agent deployments normally inject
      # AZURE_AI_PROJECT_ENDPOINT; use app-specific aliases because FOUNDRY_* and
      # AGENT_* names are reserved by the Hosted Agent container spec.
      - name: AZURE_RESOURCE_ANALYZER_PROJECT_ENDPOINT
        value: ${AZURE_AI_PROJECT_ENDPOINT}
      - name: AZURE_AI_PROJECT_ENDPOINT
        value: ${AZURE_AI_PROJECT_ENDPOINT}
      # Model deployment name used by FoundryChatClient.
      - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
        value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
      - name: AZURE_RESOURCE_ANALYZER_AGENT_NAME
        value: azure-resource-analyzer
      # workflow = specialist decomposition (default), single = one coordinator agent.
      - name: AZURE_RESOURCE_ANALYZER_RUNTIME_MODE
        value: single
      # Filesystem workspace root, resolved under $HOME on Hosted Agents.
      - name: AZURE_RESOURCE_ANALYZER_WORKSPACE_ROOT
        value: $HOME/work
      # Shell tool stays disabled by default; opt in explicitly.
      - name: AZURE_RESOURCE_ANALYZER_ENABLE_SHELL_TOOL
        value: "false"
      # Observability (Part B). Application Insights connection is injected by Foundry.
      - name: ENABLE_INSTRUMENTATION
        value: "true"
      - name: ENABLE_SENSITIVE_DATA
        value: "true"
      - name: OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT
        value: "true"
      - name: OTEL_SEMCONV_STABILITY_OPT_IN
        value: gen_ai_latest_experimental
      - name: AZURE_EXPERIMENTAL_ENABLE_GENAI_TRACING
        value: "true"
