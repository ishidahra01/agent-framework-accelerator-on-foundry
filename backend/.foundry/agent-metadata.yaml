name: azure-resource-analyzer
version: 0.3.0
description: Microsoft Agent Framework Azure resource analyzer hosted on Microsoft Foundry.
protocols:
  responses: 1.0.0
entrypoint: python main.py
runtime:
  kind: hosted-agent
  framework: microsoft-agent-framework
  inner_harness: microsoft-agent-framework
  outer_harness: microsoft-foundry-hosted-agent
  chat_client: foundry-chat-client
state:
  filesystem_persistence: true
  workspace_root_env: AGENT_WORKSPACE_ROOT
identity:
  preferred: managed-identity-or-entra-id
  development_fallback: azure-cli-default-credential
guardrails:
  secret_path_denylist: implemented
  shell_command_denylist: implemented
  hosted_agent_content_safety: planned
  acs_policy: planned-for-part-b
observability:
  application_insights_env: APPLICATIONINSIGHTS_CONNECTION_STRING
  trace_bridge: microsoft-agent-framework-telemetry
part_a_status:
  agent_framework_loop: implemented
  specialist_workflow: implemented
  internal_skills: implemented
  hosted_agent_responses_entry: implemented
  filesystem_workspace_contract: implemented
  fixed_analysis_output_contract: implemented
  approval_checkpoint: planned
  invocations_protocol: planned
